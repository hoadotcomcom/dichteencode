          }
        },
        {
          "@type": "Question",
          "name": "Vì sao teen lại dùng teencode?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Có ba lý do chính: (1) Tốc độ — gõ tắt nhanh hơn khi chat; (2) Bản sắc nhóm — teencode giúp các bạn trẻ cảm thấy thuộc về một thế hệ, một cộng đồng riêng; (3) Sáng tạo ngôn ngữ — đây là cách teen chơi với tiếng Việt, tương tự thế hệ 8x–9x từng dùng '2' thay 'hai' hay viết 'iu' thay 'yêu'."

        },

          "@type": "Question",
          "name": "Teencode có làm hỏng tiếng Việt không?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Không. Các nhà ngôn ngữ học xem teencode là một biến thể ngôn ngữ phi chính thức (informal register), tồn tại song song với tiếng Việt chuẩn. Vấn đề chỉ phát sinh khi teen dùng teencode trong văn bản trang trọng (bài kiểm tra, đơn từ). Phần lớn teen tự biết khi nào nên dùng và không dùng."
          }
        },

          "@type": "Question",

            "@type": "Answer",
            "text": "Ba mẹ không cần học thuộc — vì teencode thay đổi rất nhanh, mỗi 6 tháng lại có từ mới. Cách hiệu quả nhất là: (1) Dùng công cụ dịch teencode online; (2) Hỏi thẳng con với thái độ tò mò, không phán xét; (3) Đọc bình luận trên TikTok, Threads để bắt nhịp dần."

          "name": "'J z tr', 'ét o ét', 'chằm zn' nghĩa là gì?",

            "@type": "Answer",
            "text": "'J z tr' = 'gì vậy trời' (biểu cảm ngạc nhiên, bực mình nhẹ). 'Ét o ét' = 'SOS', lời kêu cứu hài hước. 'Chằm zn' = 'trầm cảm' nói chệch đi cho bớt nặng nề, thường dùng khi than vãn nhẹ về deadline, điểm số, crush không trả lời tin nhắn."
          }
        },

            "@type": "Answer",
            "text": "'Slay' = làm xuất sắc, đỉnh của đỉnh. 'Sus' = đáng nghi (viết tắt của suspicious). 'Fr fr' = 'for real for real', thật đó, không đùa. 'No cap' = không nói dối, nói thật. 'Mid' = tầm tầm, không hay không dở. 'Based' = ngầu, có chính kiến riêng. Những từ này đã len lỏi vào teencode Việt qua TikTok và game."
