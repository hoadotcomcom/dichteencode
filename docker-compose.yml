version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: teencode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: teencode
      POSTGRES_PASSWORD: teencode_secret
      POSTGRES_DB: teencode_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teencode"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: teencode-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@teencode.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev  # Only start with: docker compose --profile dev up

volumes:
  postgres_data:
